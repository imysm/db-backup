# 数据库备份系统配置文件

global:
  work_dir: /tmp/db-backup
  default_tz: Asia/Shanghai
  max_concurrent: 5
  timeout: 2h
  encryption_key: "change-me-to-a-strong-key"
  api_keys:
    - "default-api-key-change-me"

log:
  level: info
  format: console

tasks:
  # MySQL 备份示例
  - id: mysql_prod
    name: "生产环境MySQL备份"
    enabled: true
    database:
      type: mysql
      host: 192.168.1.100
      port: 3306
      username: backup_user
      password: "your_password"
      database: "app_db"
      params:
        max_allowed_packet: "1G"
        quick: "true"
    schedule:
      cron: "0 2 * * *"        # 每天凌晨2点
      timezone: Asia/Shanghai
    storage:
      type: local
      path: /tmp/db-backup/mysql_prod
    retention:
      keep_last: 7
      keep_days: 30
      keep_weekly: 8
      keep_monthly: 6
    compression:
      enabled: true
      type: gzip
      level: 6
    notify:
      enabled: false
      type: dingtalk
      endpoint: "https://oapi.dingtalk.com/robot/send?access_token=xxx"
